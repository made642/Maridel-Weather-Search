<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maridel Weather App Homework</title>
  </head>
  <body>
    <header>
      <form id="search-form">
        <input type="text" id="city-input" placeholder="Enter city name" />
        <button type="submit">Search</button>
      </form>
    </header>
    <h1>Maridel Weather App</h1>
    <main>
      <div id="weather-info">
        <h2 id="city-name">City Name</h2>
        <p id="temperature">Temperature: --°C</p>
        <p id="humidity">Humidity: --%</p>
        <p id="wind-speed">Wind Speed: -- km/h</p>
      </div>
    </main>

    <footer>
      This project was coded by
      <a href="https://github.com/MaridelCanada" target="_blank"
        >Maridel Canada</a
      >
      and is on GitHub and hosted on Netlify
    </footer>
  </body>
</html>
