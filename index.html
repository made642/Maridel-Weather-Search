<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />

    <script src="https://unpkg.com/axios@1.13.2/dist/axios.min.js"></script>
    <title>Maridel Weather App Homework</title>
  </head>
  <body>
    <div class="weather-app">
      <header>
        <form id="search-form">
          <input type="text" id="city-input" placeholder="Enter city name" />
          <button type="submit" id="search-button">Search</button>
        </form>
      </header>
      <h1 id="city-name"></h1>
      <main>
        <div id="weather-container">
          <div id="weather-info">
            <icon id="icon"></icon>
            <p id="current-date"></p>
            <p id="current-time"></p>
            <p id="temperature"><span class="temperature-value">--</span>°C</p>
          </div>
          <div id="weather-details">
            <div class="weather-detail">
              <h6>Description</h6>
              <p id="description">Weather description</p>
            </div>
            <div class="weather-detail">
              <h6>Humidity</h6>
              <p id="humidity"><span class="humidity-value">--</span>%</p>
            </div>
            <div class="weather-detail">
              <h6>Wind Speed</h6>
              <p id="wind-speed">
                <span class="wind-speed-value">--</span> km/h
              </p>
            </div>
          </div>
        </div>
      </main>

      <footer>
        This project was coded by
        <a href="https://github.com/MaridelCanada" target="_blank"
          >Maridel Canada</a
        >
        and is on
        <a href="https://github.com/MaridelCanada" target="_blank">GitHub</a>
        and hosted on
        <a
          href="https://another-weather-app-by-maridel.netlify.app/"
          target="_blank"
          >Netlify</a
        >
      </footer>
    </div>
  </body>
  <script src="index.js"></script>
</html>
